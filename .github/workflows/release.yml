name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Install actionlint
        run: curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- -b /usr/local/bin

      - run: npm run lint

      - name: Inject version into HTML
        env:
          VERSION: ${{ github.ref_name }}
        run: sed -i "s/__VERSION__/${VERSION}/g" Candidate_Risk_Dashboard.html

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Candidate_Risk_Dashboard.html
          generate_release_notes: true
